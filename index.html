<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vps-web</title>
  <style>
    :root {
      --bg1: #f5f7ff;
      --bg2: #dce8ff;
      --text: #14213d;
      --card: #ffffff;
      --accent: #3a86ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, var(--bg2), var(--bg1));
    }

    .card {
      padding: 48px 64px;
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 15px 40px rgba(20, 33, 61, 0.12);
      text-align: center;
      animation: rise 0.7s ease-out both;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 1px;
      color: var(--accent);
    }

    p {
      margin: 12px 0 0;
      opacity: 0.75;
      font-size: 16px;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>hello word</h1>
    <p>部署成功</p>
  </main>
</body>
</html>
